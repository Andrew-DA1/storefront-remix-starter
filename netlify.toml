[build]
command = "npm run build"
publish = "public"

[functions]
node_bundler = "esbuild"

# Увімкнути офіційний плагін Netlify для Remix
[[plugins]]
package = "@netlify/plugin-remix"

# Кеш для статичних білд-артефактів Remix
[[headers]]
  for = "/build/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, s-maxage=31536000"
