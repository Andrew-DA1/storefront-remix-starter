[build]
command = "npm run build:nf"
publish = "public"
functions = ".netlify/functions-internal"  # тут Netlify знайде server.js

[functions]
directory = ".netlify/functions-internal"
node_bundler = "esbuild"

[[redirects]]
from = "/*"
to = "/.netlify/functions/server"
status = 200

[[headers]]
  for = "/build/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, s-maxage=31536000"
